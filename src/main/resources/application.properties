spring.application.name=risk-api

spring.datasource.url=jdbc:postgresql://localhost:5463/riskdb
spring.datasource.username=riskuser
spring.datasource.password=riskpass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

management.info.env.enabled=true


info.app.name=Risk Assessment API
info.app.description=REST API for customer risk assessment and scoring
info.app.version=1.0.0
info.app.author=Adriano Reckziegel

logging.level.org.springframework.security=DEBUG
